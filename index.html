<body>
    <h1>Switch Statement</h1>

<button class="btn btn-info" onclick="teamRank()">Rank </button>

<script>
    function teamRank(){
            case (rank <= "1st");
            message = "champions!";
            break;

            case (rank <= "2nd");
            message = "second place!";
            break;

            case (rank <= "3rd");
            message = "third place!";
            break;

            case (rank <= "4th");
            message = "fourth place!";
            break;

            default;
            message = "rank could not be determined.";
        }
        alert(message);

</script>
</body>
